<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steuer-Checklisten Bundle — Zielsteuerfrei</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 40px 20px; }
        .header h1 { color: #1e3a5f; font-size: 1.8em; }
        .checkout { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .product { border-bottom: 2px solid #f0f0f0; padding-bottom: 20px; margin-bottom: 20px; }
        .product h2 { color: #1e3a5f; margin-bottom: 10px; }
        .price-row { display: flex; justify-content: space-between; align-items: center; font-size: 1.2em; }
        .total { display: flex; justify-content: space-between; font-size: 1.5em; font-weight: bold; color: #27ae60; margin: 20px 0; padding-top: 20px; border-top: 2px solid #f0f0f0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        input { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
        .btn { width: 100%; padding: 20px; background: #27ae60; color: white; border: none; border-radius: 10px; font-size: 1.2em; font-weight: 600; cursor: pointer; }
        .guarantee { text-align: center; margin-top: 20px; color: #666; font-size: 0.9em; }
        .secure { text-align: center; margin-top: 10px; color: #27ae60; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔒 Sichere Checkout</h1>
            <p>Fast geschafft — dein Bundle wartet</p>
        </div>

        <div class="checkout">
            <div class="product">
                <h2>Steuer-Checklisten Bundle 2025</h2>
                <div class="price-row">
                    <span>5 Checklisten + Templates</span>
                    <span style="text-decoration: line-through; color: #999;">97€</span>
                </div>
                <div class="price-row" style="color: #e74c3c; font-weight: bold;">
                    <span>Frühbucher-Rabatt</span>
                    <span>-70€</span>
                </div>
            </div>
            
            <div class="total">
                <span>Gesamtsumme</span>
                <span>27,00 €</span>
            </div>

            <form id="checkoutForm">
                <div class="form-group">
                    <label>Vorname</label>
                    <input type="text" placeholder="Max" required>
                </div>
                
                <div class="form-group">
                    <label>Nachname</label>
                    <input type="text" placeholder="Mustermann" required>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="max@beispiel.de" required>
                </div>
                
                <div class="form-group">
                    <label>Kreditkarte (Demo)</label>
                    <input type="text" placeholder="4242 4242 4242 4242" maxlength="19">
                </div>

                <button type="submit" class="btn">Jetzt kaufen für 27€ →</button>
            </form>

            <div class="guarantee">
                ✅ 30 Tage Geld-zurück-Garantie • Sofortiger Download
            </div>
            <div class="secure">
                🔒 SSL-verschlüsselt • Zahle sicher per Stripe
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('checkoutForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Demo-Modus: In Produktion würde hier Stripe Checkout öffnen. Danke für den Test!');
        });
    </script>
</body>
</html>
